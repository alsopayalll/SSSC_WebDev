<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="main">
        <h1>Calculate your grade</h1>
        <form>
            <label for="marks">Enter your marks : </label>
            <input id="marks" type="number">
        </form>
        <h3 id="result"></h3>
        <button id="seeGrade" type="submit">See your grade</button>
    </div>
    
</body>
</html>
